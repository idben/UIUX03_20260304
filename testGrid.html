<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>格線系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/testGrid.css">
</head>

<body>
  <!-- .container>.row>.col*6>.h-100px.bg-info>{$} -->
  <div class="container mb-5">
    <div class="row row-cols-4 g-1">
      <div class="col">
        <div class="h-100px bg-info">1</div>
      </div>
      <div class="col">
        <div class="h-100px bg-info">2</div>
      </div>
      <div class="col">
        <div class="h-100px bg-info">3</div>
      </div>
      <div class="col">
        <div class="h-100px bg-info">4</div>
      </div>
      <div class="col">
        <div class="h-100px bg-info">5</div>
      </div>
      <div class="col">
        <div class="h-100px bg-info">6</div>
      </div>
    </div>
  </div>
  <!-- .container>.row>.col*6>.box>{$} -->
  <!-- .row-cols-尺寸-欄位數 -->
  <div class="container mb-5">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-5">
      <div class="col">
        <div class="box">1</div>
      </div>
      <div class="col">
        <div class="box">2</div>
      </div>
      <div class="col">
        <div class="box">3</div>
      </div>
      <div class="col">
        <div class="box">4</div>
      </div>
      <div class="col">
        <div class="box">5</div>
      </div>
      <div class="col">
        <div class="box">6</div>
      </div>
    </div>
  </div>
  <!-- .col-尺寸-欄寬 -->
  <!-- 所以 col-md-3 會得到 12/3=4欄 -->
  <div class="container mb-5">
    <div class="row">
      <div class="col-12 col-sm-6 col-md-3 col-lg-4">
        <div class="box">1</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-8">
        <div class="box">2</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-3">
        <div class="box">3</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-9">
        <div class="box">4</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-6">
        <div class="box">5</div>
      </div>
      <div class="col-12 col-sm-6 col-md-3 col-lg-6">
        <div class="box">6</div>
      </div>
    </div>
  </div>
  <!-- .container>.row>.col-*6>.box>{$} -->
  <div class="container">
    <div class="row">
      <div class="col-4">
        <div class="box">1</div>
      </div>
      <div class="col-4">
        <div class="box">2</div>
      </div>
      <div class="col-7">
        <div class="box">3</div>
      </div>
      <div class="col-5">
        <div class="box">4</div>
      </div>
      <div class="col-5">
        <div class="box">5</div>
      </div>
      <div class="col-2">
        <div class="box">6</div>
      </div>
    </div>
  </div>
  <!-- .container.h-100>.row.h-100>.col-*2.h-100>.bg-danger-subtle.h-100 -->
  <div class="container h-100">
    <div class="row h-100">
      <div class="col-3 h-100">
        <div class="bg-danger-subtle h-100"></div>
      </div>
      <div class="col-9 h-100">
        <div class="bg-danger-subtle h-100"></div>
      </div>
    </div>
  </div>
  <!-- .container.h-100>.row.h-100>.col-4*3.h-100>.bg-primary-subtle.h-100 -->
  <div class="container h-100">
    <div class="row h-100">
      <div class="col-4 h-100">
        <div class="bg-primary-subtle h-100"></div>
      </div>
      <div class="col-4 h-100">
        <div class="bg-primary-subtle h-100"></div>
      </div>
      <div class="col-4 h-100">
        <div class="bg-primary-subtle h-100"></div>
      </div>
    </div>
  </div>
  <!-- .container.h-100>.row.h-100>.col*3.h-100>.bg-primary.h-100 -->
  <div class="container h-100">
    <div class="row h-100">
      <div class="col h-100">
        <div class="bg-primary h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-primary h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-primary h-100"></div>
      </div>
    </div>
  </div>
  <!-- .container>.row>.col*12>.bg-danger>{$} -->
  <!-- .container.h-100>.row.h-100>.col*12.h-100>.bg-danger.h-100 -->
  <div class="container h-100">
    <div class="row h-100">
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
      <div class="col h-100">
        <div class="bg-danger h-100"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
