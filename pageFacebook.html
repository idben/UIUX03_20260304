<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>page fb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./css/pageFacebook.css">
</head>

<body>
  <nav class="h50px bg-fb1">
    <div class="container h-100 d-flex align-items-center">
      <i class="fa-brands fa-square-facebook fs-2 text-light me-2"></i>

      <div id="search-bar" class="input-group input-group-sm w200px">
        <span class="input-group-text">搜尋</span>
        <input type="text" class="form-control border border-start-0 border-end-0"
          aria-label="Amount (to the nearest dollar)">
        <span class="input-group-text">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
      </div>
    </div>
  </nav>
  <main>
    <div class="container">2</div>
  </main>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script>
    document.querySelector("#search-bar").addEventListener("focusin", (event) => {
      event.target.parentElement.classList.add("active");
    });
    document.querySelector("#search-bar").addEventListener("focusout", (event) => {
      event.target.parentElement.classList.remove("active");
    });
  </script>
</body>

</html>
